<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioChain | Arquitetura da Vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --accent: #d4af37;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* HEADER & NAV */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* HERO SECTION */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), 
                        url('https://images.unsplash.com/photo-1518173946687-a4c8a3b7792e?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 10px;
            animation: fadeInDown 1s ease;
        }

        .hero p {
            max-width: 600px;
            font-size: 1.1rem;
            color: #ccc;
            animation: fadeInUp 1s ease 0.3s backwards;
        }

        /* GRID DE BIOMAS */
        .biomes-container {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .biome-card {
            position: relative;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .biome-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.2);
        }

        .biome-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .biome-card:hover img {
            transform: scale(1.1);
            filter: brightness(0.4);
        }

        .biome-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .biome-info h2 {
            font-size: 2rem;
            margin-bottom: 5px;
            font-family: 'Playfair Display', serif;
        }

        .biome-info span {
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* PÁGINA DE DETALHES (OCULTA POR PADRÃO) */
        #details-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 200;
            display: none;
            overflow-y: auto;
            padding: 100px 5%;
        }

     .btn-game{
            position: fixed;
            top: 40px;
            right: 50px;
            background: var(--primary);
            border: none;
            color: #000;
            padding: 12px 25px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            z-index: 201;
        }
    
        .close-btn {
            position: fixed;
            top: 40px;
            right: 50px;
            background: var(--primary);
            border: none;
            color: #000;
            padding: 12px 25px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            z-index: 201;
        }

        .food-chain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .creature-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .creature-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .creature-card h4 {
            color: var(--accent);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .arrow-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: var(--primary);
        }

        /* ANIMAÇÕES */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            header { padding: 20px; }
            .hero h1 { font-size: 3rem; }
            #details-page { padding-top: 120px; }
        }
    </style>
</head>

        function openBiome(id) {
            const data = biomeData[id];
            const content = document.getElementById('details-content');
            
            let chainHTML = data.chain.map((item, index) => `
                <div class="creature-card">
                    <img src="${item.img}" alt="${item.name}">
                    <h4>${item.role}</h4>
                    <h2>${item.name}</h2>
                </div>
                ${index < data.chain.length - 1 ? '<div class="arrow-indicator">➔</div>' : ''}
            `).join('');

            content.innerHTML = `
                <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem; color: var(--primary);">${data.title}</h1>
                <p style="font-size: 1.2rem; opacity: 0.8; max-width: 800px; margin-bottom: 40px;">${data.description}</p>
                <div class="food-chain-grid">
                    ${chainHTML}
                </div>
            `;

            document.getElementById('details-page').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }


        function closeDetails() {
            document.getElementById('details-page').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
