<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOTERMO • Cadeia Alimentar</title>
    <link rel="stylesheet" media="screen and (min-width: 764px)" href="css/mobile.css">
    <link rel="stylesheet" media="screen and (max-width: 764px)" href="css/mobile.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title">BIOTERMO</div>
        </header>

        <div class="game-area">
            <div id="board"></div>

            <div class="controls">
                <button class="btn" onclick="restartGame()">Novo animal</button>
            </div>
        </div>
    </div>

    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="font-family:'Playfair Display',serif;font-size:2.6rem;margin-bottom:10px;"></h2>
            <img id="modal-img" src="" alt="">
            
            <div style="margin:20px 0;font-size:1.3rem;">
                <strong id="modal-biome"></strong> • 
                <span id="modal-role" style="color:#e67e22;"></span>
            </div>

            
            <div id="modal-chain" class="chain-grid"></div>

            <button onclick="closeModal()" style="background:var(--green);color:#2c3e2a;padding:16px 60px;border:none;border-radius:50px;font-weight:700;font-size:1.2rem;margin-top:20px;cursor:pointer;">JOGAR NOVAMENTE</button>
            
        

    <script>
       
        const animals = [
            {
                name: "Capivara",
                clues: [
                    "Maior roedor do mundo, vive em grupos sociais",
                    "Consumidor primário em biomas alagados como o Pantanal",
                    "Alimenta-se de gramíneas e plantas aquáticas",
                    "É presa favorita de jacarés e onças",
                    "Nada com facilidade e passa muito tempo na água"
                ],
                img: "https://th.bing.com/th/id/OIP.M9K3LM4VXKNzM14yQU4n6wHaG7?w=186&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
                biome: "Pantanal",
                role: "Consumidor Primário"
            },
            {
                name: "Jacaré-do-Pantanal",
                clues: [
                    "Réptil com mandíbula poderosa, comum em rios e lagos",
                    "Consumidor secundário no Pantanal",
                    "Caça peixes, capivaras e aves",
                    "Banha-se ao sol para regular temperatura",
                    "População protegida após anos de caça"
                ],
                img: "https://th.bing.com/th/id/OIP.HUVolRvKjfjswzwb9LJmrAHaE7?w=275&h=183&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
                biome: "Pantanal",
                role: "Consumidor Secundário"
            },
            {
                name: "Ariranha",
                clues: [
                    "Lontra gigante, predador de topo no Pantanal",
                    "Alimenta-se quase exclusivamente de peixes",
                    "Vive em famílias e é muito vocal",
                    "Está ameaçada de extinção no Brasil",
                    "Nada com velocidade impressionante"
                ],
                img: "https://th.bing.com/th/id/OIP.5zV9yhg245_p4Q8-HgmvBAHaE8?w=305&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
                biome: "Pantanal",
                role: "Predador de Topo"
            },
            {
                name: "Onça-pintada",
                clues: [
                    "Maior felino das Américas, predador ápice",
                    "Habita Amazônia e Pantanal",
                    "Caça com mordida que perfura o crânio",
                    "Pelagem com rosetas únicas",
                    "Excelente nadadora e escaladora"
                ],
                img: "https://th.bing.com/th/id/OIP.AS7czbSjVLWPVhOv7UtIAgHaE8?w=265&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
                biome: "Amazônia",
                role: "Predador de Topo"
            },
            {
                name: "Mico-leão-dourado",
                clues: [
                    "Primata endêmico e ameaçado da Mata Atlântica",
                    "Consumidor primário, come frutas e insetos",
                    "Pelagem dourada brilhante",
                    "Vive em famílias monogâmicas",
                    "Salvo por programas de reprodução em cativeiro"
                ],
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leontopithecus_rosalia.jpg/800px-Leontopithecus_rosalia.jpg",
                biome: "Mata Atlântica",
                role: "Consumidor Primário"
            },
            {
                name: "Tatu-bola",
                clues: [
                    "Mamífero que se enrola em bola para defesa",
                    "Habita a Caatinga semiárida",
                    "Consumidor primário, come insetos e raízes",
                    "É endêmico do Brasil",
                    "Ameaça de extinção por caça e habitat"
                ],
                img: "https://th.bing.com/th/id/OIP.3fKqZx8vL9pN2mQjR5vXwAHaE8?w=300&h=200&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
                biome: "Caatinga",
                role: "Consumidor Primário"
            }
        ];

       
        const biomeChains = {
            "Pantanal": [
                { role: "Produtor", name: "Gramíneas Aquáticas", emoji: "🌿" },
                { role: "Consumidor Primário", name: "Capivara", emoji: "🦫" },
                { role: "Consumidor Secundário", name: "Jacaré-do-Pantanal", emoji: "🐊" },
                { role: "Predador de Topo", name: "Ariranha", emoji: "🦦" }
            ],
            "Amazônia": [
                { role: "Produtor", name: "Floresta Tropical", emoji: "🌳" },
                { role: "Consumidor Primário", name: "Capivara", emoji: "🦫" },
                { role: "Consumidor Secundário", name: "Onça-pintada", emoji: "🐆" },
                { role: "Predador de Topo", name: "Onça-pintada", emoji: "🐆" }
            ],
            "Mata Atlântica": [
                { role: "Produtor", name: "Frutas da Mata", emoji: "🍓" },
                { role: "Consumidor Primário", name: "Mico-leão-dourado", emoji: "🐒" },
                { role: "Consumidor Secundário", name: "Onça-pintada", emoji: "🐆" },
                { role: "Predador de Topo", name: "Onça-pintada", emoji: "🐆" }
            ],
            "Caatinga": [
                { role: "Produtor", name: "Cactos e Raízes", emoji: "🌵" },
                { role: "Consumidor Primário", name: "Tatu-bola", emoji: "🦔" },
                { role: "Consumidor Secundário", name: "Serpente", emoji: "🐍" },
                { role: "Predador de Topo", name: "Onça-pintada", emoji: "🐆" }
            ]
        };

       
        let currentAnimal = {};
        let currentRow = 0;
        let gameOver = false;
        let possibleNames = animals.map(a => a.name);
        let clueBoxes = [];
        let feedbackBoxes = [];
        let inputEls = [];

        function normalize(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }
       
        function createBoard() {
            const board = document.getElementById("board");
            board.innerHTML = "";
            clueBoxes = []; feedbackBoxes = []; inputEls = [];

            for (let i = 0; i < 5; i++) {
                const row = document.createElement("div");
                row.className = "game-row";
                row.innerHTML = `
                    <div class="clue-box" id="clue-${i}"></div>
                    <div class="feedback-box" id="fb-${i}"></div>
                    <input type="text" class="guess-input" id="input-${i}" placeholder="Nome do animal...">
                `;
                board.appendChild(row);

                clueBoxes.push(document.getElementById(`clue-${i}`));
                feedbackBoxes.push(document.getElementById(`fb-${i}`));
                inputEls.push(document.getElementById(`input-${i}`));
            }

            inputEls.forEach((input, idx) => {
                input.addEventListener("keydown", e => {
                    if (e.key === "Enter" && idx === currentRow && !gameOver) submitGuess(idx);
                });
            });
        }

        // novo game
        function startNewGame() {
            currentAnimal = animals[Math.floor(Math.random() * animals.length)];
            currentRow = 0;
            gameOver = false;

            for (let i = 0; i < 5; i++) {
                clueBoxes[i].textContent = "";
                feedbackBoxes[i].innerHTML = "";
                feedbackBoxes[i].style.backgroundColor = "#d2a679";
                inputEls[i].value = "";
                inputEls[i].disabled = true;
            }

            clueBoxes[0].textContent = currentAnimal.clues[0];
            inputEls[0].disabled = false;
            inputEls[0].focus();
        }

        
        function submitGuess(rowIndex) {
            if (gameOver || rowIndex !== currentRow) return;

            const guess = inputEls[rowIndex].value.trim();
            if (!guess) return;

            const normGuess = normalize(guess).trim();
            const normAnswer = normalize(currentAnimal.name);


            function calcularSimilaridade(s1, s2) {
                let edicoes = 0;
                const l1 = s1.length;
                const l2 = s2.length;
                
                
                if (Math.abs(l1 - l2) > 2) return false;

                let acertos = 0;
                const menor = Math.min(l1, l2);
                
                for (let i = 0; i < menor; i++) {
                    if (s1[i] === s2[i]) acertos++;
                }

                return (acertos / l1) >= 0.7;
            }

            let status = "errado";
            let emoji = "❌";
            let color = "#e74c3c";

            if (normGuess === normAnswer) {
                status = "certo";
                emoji = "✅";
                color = "#2ecc71";
            } else if (possibleNames.some(n => {
                const normName = normalize(n);
                
                return calcularSimilaridade(normGuess, normName);
            })) {
                status = "perto";
                emoji = "🟨";
                color = "#f1c40f";
            }

            feedbackBoxes[rowIndex].innerHTML = emoji;
            feedbackBoxes[rowIndex].style.backgroundColor = color;
            inputEls[rowIndex].disabled = true;

            if (status === "certo") {
                gameOver = true;
                showWinModal();
                return;
            }

            currentRow++;
            if (currentRow < 5) {
                clueBoxes[currentRow].textContent = currentAnimal.clues[currentRow];
                inputEls[currentRow].disabled = false;
                inputEls[currentRow].focus();
            } else {
                gameOver = true;
                showLoseModal();
            }
        }

        // ==================== MODAL WIN (com cadeia alimentar completa) ====================
        function showWinModal() {
            const modal = document.getElementById("modal");
            document.getElementById("modal-title").innerHTML = `PARABÉNS!<br>Você acertou <strong>${currentAnimal.name}</strong>`;
            document.getElementById("modal-title").style.color = "#2ecc71";
            document.getElementById("modal-img").src = currentAnimal.img;
            document.getElementById("modal-biome").textContent = currentAnimal.biome;
            document.getElementById("modal-role").textContent = currentAnimal.role;

            // Cadeia alimentar visual
            const chainContainer = document.getElementById("modal-chain");
            chainContainer.innerHTML = "";

            const chain = biomeChains[currentAnimal.biome] || biomeChains["Pantanal"];
            chain.forEach(item => {
                const card = document.createElement("div");
                card.className = "chain-card";
                if (item.name === currentAnimal.name || item.role === currentAnimal.role) {
                    card.classList.add("highlight");
                }
                card.innerHTML = `
                    <div style="font-size:2.8rem;margin-bottom:6px;">${item.emoji}</div>
                    <div style="font-size:0.95rem;font-weight:700;">${item.role}</div>
                    <div style="font-size:1.05rem;color:#2c3e2a;">${item.name}</div>
                `;
                chainContainer.appendChild(card);
            });

            modal.style.display = "flex";
        }
          function showLoseModal() {
            const modal = document.getElementById("modal");
            document.getElementById("modal-title").innerHTML = `FIM DE JOGO<br>A resposta era <strong>${currentAnimal.name}</strong>`;
            document.getElementById("modal-title").style.color = "#e74c3c";
            document.getElementById("modal-img").src = currentAnimal.img;
            document.getElementById("modal-biome").textContent = currentAnimal.biome;
            document.getElementById("modal-role").textContent = currentAnimal.role;

            const chainContainer = document.getElementById("modal-chain");
            chainContainer.innerHTML = `<p style="color:#e74c3c;font-size:1.3rem;">Tente novamente no próximo animal!</p>`;

            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            restartGame();
        }

        function restartGame() {
            document.getElementById("modal").style.display = "none";
            startNewGame();
        }

        function switchMode(mode) {
            const btns = document.querySelectorAll(".mode-btn");
            btns.forEach(b => b.classList.remove("active"));
            btns[mode-1].classList.add("active");
            if (mode === 2) alert("🔧 Modo 2 (Animais avançados) em breve!");
        }

        // treco que começa
        window.onload = () => {
            createBoard();
            startNewGame();

            // Atalho no R para refazer os treco
            document.addEventListener("keydown", e => {
                if (e.key.toLowerCase() === "r" && gameOver) restartGame();
            });
        };
    </script>

    </div>
    </div>
</body>
</html>
